[tool.black]
line-length = 120
skip-string-normalization = true
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | \.venv3
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[tool.ruff]
exclude = [
    '.git',
    '__pycache__',
    'venv',
    'venv3',
]
line-length = 120
src = ['surface', 'e2e']

[tool.ruff.lint]
ignore = []
select = [
    'E',
    'F',
    'W',
    "I001",
]

[tool.ruff.lint.isort]
known-first-party = ["dkron", "django_restful_admin", "slackbot", "dbcleanup", "olympus", "notifications", "ppbenviron", "logbasecommand", "impersonate", "apitokens", "sbomrepo"]

# Django migrations and large JSON/CVE fixtures: line length is noise; do not reformat generated blobs.
[tool.ruff.lint.per-file-ignores]
"surface/**/migrations/*.py" = ["E501"]
"surface/sca/tests/data.py" = ["E501"]
"surface/scanner_baseline/tests/test_generic.py" = ["E501"]
"surface/secretsmanager/tests/fixtures.py" = ["E501"]
"surface/surface/settings.py" = ["E501"]

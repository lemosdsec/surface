detectors:
  - name: sensitive_keys
    keywords:
      - jira_password
      - pager_duty_token
      - slack_app_token
      - slack_bot_token
      - slack_signing_secret
      - apikey
      - accesskeyid
      - secretaccesskey
      - git_private_token
      - github_token
      - github_private_token
      - gitlabapikey
      - jwtkey
      - -passphrase
      - client_secret
      - clientsecret
      - client-secret
      - client-id
      - client_id
      - secretkey
      - authorization
      - spring.datasource.username
    regex:
      general_secrets: "(?i)[\"|']{0,1}(jira_password|pager_duty_token|slack_app_token|slack_bot_token|slack_signing_secret|apikey|accesskeyid|secretaccesskey|git_private_token|github_token|github_private_token|gitlabapikey|jwtkey|-passphrase|client_secret|clientsecret|client-secret|client-id|client_id|secretkey|authorization|spring\\.datasource\\.username)\\b[\"|']{0,1}\\s*[:=]\\s*['\"]?(.*)['\"]?"

  - name: jdbc_connection_string
    keywords:
      # Quoted: bare `jdbc:` is parsed by YAML as a mapping ({jdbc: null}),
      # which trufflehog's protobuf loader rejects with
      # `invalid value for string field keywords: {`.
      - "jdbc:"
    regex:
      jdbc_url: "(?i)\\b(jdbc:[a-z0-9]+://[^\\s'\";>]+)"

  - name: password_finder
    keywords:
      - password
      - pwd
      - pw
      - aes_encrypt(
    regex:
      passwords: "(?i)[\"|']{0,1}(?:password|pwd|pw)[\"|']{0,1}\\s*[:=]\\s*['\"]?(.*)['\"]?"
